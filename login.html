<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход в систему качества</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
        }
        .login-card .card-header {
            background: white;
            border-bottom: none;
            text-align: center;
            padding-top: 2rem;
        }
        .login-card .card-body {
            padding: 1.5rem 2rem 2rem;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 0.5rem;
        }
        .btn-login {
            background-color: #1e3c72;
            border: none;
            font-weight: 600;
            padding: 0.7rem;
            font-size: 1.1rem;
            border-radius: 2rem;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #0f2a4f;
            transform: scale(0.98);
        }
        .form-control {
            border-radius: 1rem;
            border: 1px solid #ced4da;
            padding: 0.7rem 1rem;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #1e3c72;
            box-shadow: 0 0 0 0.2rem rgba(30,60,114,0.25);
        }
        .custom-checkbox .custom-control-input:checked~.custom-control-label::before {
            background-color: #1e3c72;
            border-color: #1e3c72;
        }
        .flash-message {
            border-radius: 2rem;
            font-size: 0.9rem;
        }
        @media (max-width: 480px) {
            .login-card .card-body {
                padding: 1.5rem;
            }
            .logo {
                max-width: 140px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="card-header">
           <img src="{{ url_for('static', filename='logo psk.svg') }}" alt="Логотип" class="logo">
            <h4 class="mt-2 text-dark">Департамент качества</h4>
            <p class="text-muted mb-0">Введите ваши учётные данные</p>
        </div>
        <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show flash-message" role="alert">
                            {{ message }}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="full_name">ФИО сотрудника</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Иванов Иван Иванович" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль" required>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary btn-login btn-block">
                    <i class="fas fa-sign-in-alt mr-2"></i> Войти
                </button>
            </form>
            <hr class="my-4">
            <div class="text-center text-muted small">
                <i class="fas fa-laptop"></i> Система контроля качества ЖБИ
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
