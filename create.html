<!DOCTYPE html>
<html>
<head>
    <title>Создание паспорта качества</title>
</head>
<body>
    <h2>Создание паспорта качества</h2>
    <form method="POST">
        <label>Номер документа:</label><br>
        <input type="text" name="doc_number"><br><br>
        <label>Дата документа:</label><br>
        <input type="date" name="doc_date"><br><br>
        <label>Наименование изделия:</label><br>
        <input type="text" name="product_name"><br><br>
        <label>Серия чертежей:</label><br>
        <input type="text" name="drawing_series"><br><br>
        <label>Класс бетона:</label><br>
        <input type="text" name="concrete_class"><br><br>
        <label>Отпускная прочность:</label><br>
        <input type="text" name="release_strength"><br><br>
        <label>Фактическая прочность:</label><br>
        <input type="text" name="actual_strength"><br><br>
        <label>Категория поверхности:</label><br>
        <input type="text" name="surface_category"><br><br>
        <label>Масса (т):</label><br>
        <input type="text" name="weight"><br><br>
        <label>Морозостойкость:</label><br>
        <input type="text" name="frost"><br><br>
        <label>Водонепроницаемость:</label><br>
        <input type="text" name="waterproof"><br><br>
        <label>Дополнительно:</label><br>
        <textarea name="additional_info"></textarea><br><br>
        <label>Счёт:</label><br>
        <input type="text" name="account"><br><br>
        <label>Количество:</label><br>
        <input type="number" name="quantity"><br><br>
        <button type="submit">Сохранить</button>
    </form>
    <br>
    <a href="/">На главную</a>
</body>
</html>
