{% extends "base.html" %}
{% block title %}{{ 'Редактирование' if role else 'Новая роль' }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h3>{{ 'Редактирование роли' if role else 'Новая роль' }}</h3></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group"><label>Название</label><input type="text" name="name" class="form-control" value="{{ role.name if role else '' }}" required></div>
            <div class="form-group"><label>Описание</label><textarea name="description" class="form-control">{{ role.description if role else '' }}</textarea></div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('admin.roles_list') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
