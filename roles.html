{% extends "base.html" %}
{% block title %}Управление ролями{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>🔐 Роли</h2>
    <a href="{{ url_for('admin.role_add') }}" class="btn btn-success"><i class="fas fa-plus"></i> Добавить роль</a>
</div>
<div class="table-responsive">
    <table class="table table-bordered">
        <thead class="thead-light"><tr><th>ID</th><th>Название</th><th>Описание</th><th>Действия</th></tr></thead>
        <tbody>
        {% for role in roles %}
        <tr>
            <td>{{ role.id }}</td>
            <td>{{ role.name }}</td>
            <td>{{ role.description or '' }}</td>
            <td>
                <a href="{{ url_for('admin.role_edit', role_id=role.id) }}" class="btn btn-sm btn-primary">✏️</a>
                <form method="POST" action="{{ url_for('admin.role_delete', role_id=role.id) }}" style="display:inline;" onsubmit="return confirm('Удалить роль?')">
                    <button class="btn btn-sm btn-danger">🗑️</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
