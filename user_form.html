{% extends "base.html" %}
{% block title %}{{ 'Редактирование' if user else 'Создание' }} пользователя{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3>{{ 'Редактирование' if user else 'Новый пользователь' }}</h3>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label>ФИО</label>
                <input type="text" name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required>
            </div>
            <div class="form-group">
                <label>Пароль {{ '(оставьте пустым, чтобы не менять)' if user else '' }}</label>
                <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select name="role_id" class="form-control" required>
                    {% for role in roles %}
                    <option value="{{ role.id }}" {% if user and user.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-check">
                <input type="checkbox" name="is_protected" class="form-check-input" {% if user and user.is_protected %}checked{% endif %}>
                <label class="form-check-label">Защищённая запись (нельзя удалить)</label>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Сохранить</button>
            <a href="{{ url_for('admin.users_list') }}" class="btn btn-secondary mt-3">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
